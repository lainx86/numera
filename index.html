<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Numera is a visual template for learning numerical methods with Python and MATLAB."
    />
    <title>Numera</title>
  </head>
  <body>
    <script>
      (() => {
        const stored = window.localStorage.getItem('numera-theme');
        if (stored === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
